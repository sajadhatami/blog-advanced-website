<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog Posts</title>
</head>
<body>
{% for post in posts %}
  <div>
    <h2>
      <a href="{% url 'blog:post_detail' post.slug %}">
        {{ post.title }}
      </a>
    </h2>

    <p>{{ post.excerpt }}</p>
    <small>{{ post.created_at }}</small>
  </div>
{% endfor %}

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>{{ post.title }}</h1>

{% if post.image %}
<img src="{{ post.image.url }}" alt="{{ post.title }}">
{% endif %}

<p>{{ post.content }}</p>

<p>Author: {{ post.author }}</p>
<p>Category: {{ post.category }}</p>
<p>Published: {{ post.created_at }}</p>
</body>
</html>
